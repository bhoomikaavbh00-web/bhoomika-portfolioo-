<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhoomi | Professional Portfolio</title>
    <meta name="description" content="Professional portfolio showcasing projects, education, and certifications.">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">Bhoomi<span class="text-gradient">.</span></a>
            <button class="menu-toggle"><i class="fas fa-bars"></i></button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="certification.html">Certifications</a></li>
            </ul>
        </div>
    </header>

    <main>
        <section class="section hero-section container" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap-reverse; padding-top: 10rem;">
            <div class="hero-content animate-on-scroll" style="flex: 1; min-width: 300px; padding-right: 2rem;">
                <h2 style="font-size: 1.5rem; color: var(--secondary-color); margin-bottom: 1rem;">Hello, I'm</h2>
                <h1 style="font-size: 4rem; font-weight: 800; line-height: 1.1; margin-bottom: 1.5rem;">Bhoomi</h1>
                <h3 style="font-size: 2rem; color: var(--text-secondary); margin-bottom: 2rem;">Welcome to my <span class="text-gradient">Portfolio</span></h3>
                <p style="font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 2.5rem; max-width: 500px;">
                    I am passionate about creating impactful solutions. Explore my projects, background, and certifications.
                </p>
                <div class="hero-btns" style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <a href="#" class="btn btn-primary view-image-btn" data-src="resume.jpeg">
                        <i class="fas fa-file-alt" style="margin-right: 0.5rem;"></i> View/Download Resume
                    </a>
                    <a href="mailto:contact@example.com" class="btn btn-outline">
                        <i class="fas fa-envelope" style="margin-right: 0.5rem;"></i> Contact Me
                    </a>
                </div>
                <div class="social-links" style="margin-top: 3rem; display: flex; gap: 1.5rem; font-size: 1.5rem;">
                    <a href="#" style="color: var(--text-secondary); transition: color var(--transition-fast);"><i class="fab fa-linkedin"></i></a>
                    <a href="#" style="color: var(--text-secondary); transition: color var(--transition-fast);"><i class="fab fa-github"></i></a>
                </div>
            </div>
            <div class="hero-image animate-on-scroll" style="flex: 1; min-width: 300px; display: flex; justify-content: center; margin-bottom: 3rem;">
                <div class="img-wrapper" style="position: relative; width: 350px; height: 350px; border-radius: 30%; overflow: hidden; border: 4px solid var(--border-color); box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
                    <img src="profile.jpeg" alt="Bhoomi" style="width: 100%; height: 100%; object-fit: cover;">
                    <div style="position: absolute; inset: 0; background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(6, 182, 212, 0.2)); mix-blend-mode: overlay;"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal for Resume/Certificates -->
    <div class="modal" id="imageModal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script src="script.js"></script>
</body>
</html>
